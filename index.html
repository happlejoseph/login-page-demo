<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
        <main>
            <section>
                <div class="container-1">
                    <div class="form-container">
                        <form action="">
                            <h1>Create account</h1>
                            <p class="trail">Let's get started with your 30 days trail</p>
                            <input type="text" placeholder="Name">
                            <input type="email" placeholder="Email">
                            <input type="password" placeholder="Password">
                            <button type="submit">Create account</button>
                            <p>Already have an account? <span>Login</span></p>
                        </form>
                        <div class="icon-container">
                            <div class="icon">
                                <img src="https://img.icons8.com/?size=100&id=V5cGWnc9R4xj&format=png&color=000000" alt="">
                            </div>
                            <div class="icon">
                                <img src="https://img.icons8.com/?size=100&id=30840&format=png&color=000000" alt="">
                            </div>
                            <div class="icon">
                                <img src="https://img.icons8.com/?size=100&id=uLWV5A9vXIPu&format=png&color=000000" alt="">
                            </div>
                        </div>
                    </div>
                    <div class="container-3">
                        <!-- <img src="/images/9ba0ef3d-1746-4540-b6d8-aa0e8d0f6d5d.jpg" alt=""> -->
                    </div>
                </div>
            </section>
        </main>
</body>
</html>
